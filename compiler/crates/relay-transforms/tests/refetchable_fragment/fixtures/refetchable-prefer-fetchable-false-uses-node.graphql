# When a type implements both Node and @fetchable, setting
# preferFetchable: false should use the Node refetch strategy
# (same as omitting the argument). Before the fix, the boolean
# value was ignored and presence alone triggered fetchable-preferred.
fragment RefetchableFragment on FetchableType
  @refetchable(queryName: "RefetchableFragmentQuery", preferFetchable: false) {
  fetch_id
}
