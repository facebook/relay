query TestQuery @updatable {
  node(id: 4) {
    __typename
    ... on Page {
      name
    }
    ... on Comment {
      firstName
    }
  }
  node_union: node(id: 5) {
    __typename
    ... on Feedback {
      commentBodies {
        edges {
          node {
            __typename
            ... on PlainCommentBody {
              text {
                text
              }
            }
            ... on MarkdownCommentBody {
              text {
                text
              }
            }
          }
        }
      }
    }
  }
}